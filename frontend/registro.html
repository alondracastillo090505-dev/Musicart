<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>MusicArt - Registro</title>

    <link rel="stylesheet" href="style.css">
    <script src="js/registro.js"></script>

</head>

<body>

    <div class="login-container">

        <form class="registro-form">

            <h2>Crear Cuenta</h2>

            <div class="input-group">

                <label>Usuario</label>

                <input
                    type="text"
                    id="usuario"
                    required
                >

            </div>

            <div class="input-group">

                <label>Correo</label>

                <input
                    type="email"
                    id="correo"
                    required
                >

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    required
                >

            </div>

            <div class="input-group">

                <label>Confirmar Password</label>

                <input
                    type="password"
                    id="confirmar"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn-primary"
            >
                Registrarse
            </button>

            <div class="divider">ó</div>

            <button
                type="button"
                class="btn-secondary"
                onclick="window.location.href='login.html'"
            >
                Volver al Login
            </button>

        </form>

    </div>
</body>

</html>
