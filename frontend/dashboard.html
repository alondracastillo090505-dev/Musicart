<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>MusicArt </title>

    <style>

        body{

            margin: 0;

            font-family: Arial, sans-serif;

            background:
            linear-gradient(to bottom,
            #140000,
            #050505);

            color: white;

        }

        nav{

            display: flex;

            justify-content: space-between;

            align-items: center;

            padding: 20px 40px;

            background-color: #111;

            box-shadow:
            0 2px 10px rgba(255,0,0,0.2);

        }

        nav h1{

            color: #ff2b2b;

            margin: 0;

        }

        .logout-btn{

            background-color: #ff1e1e;

            border: none;

            color: white;

            padding: 10px 18px;

            border-radius: 8px;

            cursor: pointer;

            transition: 0.3s;

            font-weight: bold;

        }

        .logout-btn:hover{

            background-color: #cc0000;

            transform: scale(1.05);

        }

        .titulo{

            text-align: center;

            margin-top: 30px;

            font-size: 32px;

        }

        #contenedor{

            display: grid;

            grid-template-columns:
            repeat(auto-fit,
            minmax(250px, 1fr));

            gap: 20px;

            padding: 40px;

        }

        .card{

            background-color: #181818;

            border-radius: 15px;

            overflow: hidden;

            transition: 0.3s;

            box-shadow:
            0 0 10px rgba(0,0,0,0.5);

        }

        .card:hover{

            transform: translateY(-5px);

            box-shadow:
            0 0 20px rgba(255,0,0,0.3);

        }

        .card img{

            width: 100%;

            height: 250px;

            object-fit: cover;

        }

        .info{

            padding: 15px;

            text-align: center;

        }

        .info h2{

            margin: 10px 0;

            font-size: 22px;

        }

        .info p{

            color: #b3b3b3;

            margin-bottom: 15px;

        }

        audio{

            width: 100%;

        }

    </style>

</head>

<body>

    <nav>

        <h1>🎵 MusicArt</h1>

        <button
            class="logout-btn"
            onclick="cerrarSesion()"
        >
            Cerrar sesión
        </button>

    </nav>

    <h2 class="titulo">
         Music
    </h2>

    <div id="contenedor"></div>

    <script src="js/dashboard.js"></script>

</body>

</html>
