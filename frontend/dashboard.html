<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MusicArt</title>

    <style>

        body {

            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #140000, #050505);
            color: white;

        }

        nav {

            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #111;

        }

        nav h1 {

            color: #ff2b2b;

        }

        .logout-btn {

            background-color: #ff1e1e;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;

        }

        .titulo {

            text-align: center;
            margin-top: 30px;
            font-size: 35px;

        }

        .buscador {

            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;

        }

        .buscador input {

            width: 300px;
            padding: 12px;
            border: none;
            border-radius: 10px;

        }

        .buscador button {

            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background-color: #ff1e1e;
            color: white;
            cursor: pointer;

        }

        #contenedor {

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;

        }

        .card {

            background-color: #181818;
            border-radius: 15px;
            overflow: hidden;

        }

        .card img {

            width: 100%;
            height: 250px;
            object-fit: cover;

        }

        .info {

            padding: 15px;
            text-align: center;

        }

        audio {

            width: 100%;
            margin-top: 10px;

        }

    </style>

</head>

<body>

    <nav>

        <h1>🎵 MusicArt</h1>

        <button class="logout-btn" onclick="cerrarSesion()">
            Cerrar sesión
        </button>

    </nav>

    <h2 class="titulo">Recomendación de Música</h2>

    <div class="buscador">

        <input type="text" id="artista" placeholder="Buscar artista o género">

        <button onclick="obtenerMusica()">
            Buscar
        </button>

    </div>

    <div id="contenedor"></div>

    <script src="js/dashboard.js"></script>

</body>

</html>
