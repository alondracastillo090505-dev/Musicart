<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MusicArt</title>

  <style>

    body{
      font-family: Arial;
      background-color: #121212;
      color: white;
      padding: 20px;
    }

    h1{
      text-align: center;
    }

    #contenedor{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card{
      background: #1e1e1e;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    img{
      width: 100%;
      border-radius: 10px;
    }

    audio{
      width: 100%;
      margin-top: 10px;
    }

  </style>

</head>

<body>

  <h1> MusicArt </h1>

  <div id="contenedor"></div>

  <script>

    async function obtenerMusica() {

      const respuesta = await fetch(
        "http://localhost:3000/api/musica/rock"
      );

      const canciones = await respuesta.json();

      const contenedor = document.getElementById("contenedor");

      canciones.forEach(cancion => {

        contenedor.innerHTML += `

          <div class="card">

            <img src="${cancion.imagen}">

            <h2>${cancion.titulo}</h2>

            <p>${cancion.artista}</p>

            <audio controls>
              <source src="${cancion.preview}">
            </audio>

          </div>

        `;

      });

    }

    obtenerMusica();

  </script>

</body>

</html>
