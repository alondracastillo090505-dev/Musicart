<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login MusicArt</title>

    <style>

        body {

            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #140000, #050505);
            font-family: Arial, sans-serif;

        }

        .login {

            width: 350px;
            background-color: #181818;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);

        }

        h1 {

            color: #ff2b2b;
            margin-bottom: 30px;

        }

        input {

            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;

        }

        button {

            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            background-color: #ff1e1e;
            color: white;
            font-size: 17px;
            cursor: pointer;
            font-weight: bold;

        }

        p {

            color: white;
            margin-top: 15px;

        }

    </style>

</head>

<body>

    <div class="login">

        <h1>🎵 MusicArt</h1>

        <input type="text" id="usuario" placeholder="Usuario">

        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="iniciarSesion()">
            Iniciar Sesión
        </button>

        <p id="mensaje"></p>

    </div>

    <script>

        async function iniciarSesion() {

            const usuario =
            document.getElementById("usuario").value;

            const password =
            document.getElementById("password").value;

            const mensaje =
            document.getElementById("mensaje");

            const respuesta = await fetch(
                "http://localhost:3000/login",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        usuario,
                        password
                    })
                }
            );

            const datos = await respuesta.json();

            if(datos.acceso){

                window.location.href =
                "dashboard.html";

            } else {

                mensaje.innerHTML =
                "Usuario o contraseña incorrectos";

            }

        }

    </script>

</body>

</html>
